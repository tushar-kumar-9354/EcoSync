# EcoSync Production Docker Compose
# Phase 2: City-wide deployment infrastructure

version: '3.8'

services:
  # --- Core Application ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=production
    container_name: ecosync-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=info
      - SIMULATION_UPDATE_INTERVAL=60
      - CORS_ORIGINS=https://ecosync.city.gov,https://app.ecosync.city
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - ecosync-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=production
    container_name: ecosync-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.ecosync.city
      - NEXT_PUBLIC_WS_URL=wss://api.ecosync.city
    restart: always
    depends_on:
      - backend
    networks:
      - ecosync-network

  # --- Data Layer (TimescaleDB for production) ---
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: ecosync-timescaledb
    environment:
      - POSTGRES_USER=ecosync
      - POSTGRES_PASSWORD=${ECOSYNC_DB_PASSWORD}
      - POSTGRES_DB=ecosync
    volumes:
      - ecosync-db-data:/var/lib/postgresql/data
      - ./infrastructure/timescale/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecosync"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - ecosync-network

  # --- Redis for caching & real-time ---
  redis:
    image: redis:7-alpine
    container_name: ecosync-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ecosync-redis-data:/data
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - ecosync-network

  # --- MLflow for model tracking ---
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: ecosync-mlflow
    ports:
      - "5050:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MLFLOW_S3_ENDPOINT_URL=https://s3.amazonaws.com
      - MLFLOW_TRACKING_URI=http://localhost:5050
    volumes:
      - ecosync-mlflow:/mlflow
    restart: always
    networks:
      - ecosync-network

  # --- Nginx reverse proxy ---
  nginx:
    image: nginx:alpine
    container_name: ecosync-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - ecosync-network

  # --- Prometheus for metrics ---
  prometheus:
    image: prom/prometheus:latest
    container_name: ecosync-prometheus
    ports:
      - "9090:9090"
    environment:
      - PROMETHEUS_RETENTION_TIME=15d
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ecosync-prometheus-data:/prometheus
    restart: always
    networks:
      - ecosync-network

  # --- Grafana for dashboards ---
  grafana:
    image: grafana/grafana:latest
    container_name: ecosync-grafana
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ecosync-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always
    networks:
      - ecosync-network

volumes:
  ecosync-db-data:
  ecosync-redis-data:
  ecosync-mlflow:
  ecosync-prometheus-data:
  ecosync-grafana-data:

networks:
  ecosync-network:
    driver: bridge
