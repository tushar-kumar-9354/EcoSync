global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  # Backend metrics
  - job_name: 'ecosync-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Frontend metrics (if enabled)
  - job_name: 'ecosync-frontend'
    static_configs:
      - targets: ['frontend:3000']
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Nginx metrics (if nginx_exporter is enabled)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
